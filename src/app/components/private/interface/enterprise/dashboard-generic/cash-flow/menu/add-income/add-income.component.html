<form class="m-3 d-flex flex-column" (submit)="handleSubmit()" [formGroup]="formAddIncome">
    <h3 class="h3-form m-3"><i class="fa-solid fa-coins m-1"></i> Añadir un <span style="color: green">ingreso</span></h3>
    <section class="m-3">

        <div class="text-start">
            <label for="concept" class="form-label text-start">Concepto</label>
            <input type="text" class="form-control" id="concept" placeholder="Ej. 'Ingreso por venta de panel solar'" formControlName="concept">
        </div>
        <div class="text-start">
            <label for="amount" class="form-label text-start">Monto</label>
            <input type="number" class="form-control" id="amount" placeholder="0" formControlName="amount">
        </div>
        <div class="text-start">
            <label for="paymentMethod" class="form-label text-start">Método de pago</label>
            <select type="number" class="form-control" id="paymentMethod" placeholder="0" formControlName="paymentMethod">
                <option selected disabled>Selecciona un método de pago</option>
                @for(paymentMethod of paymentMethods; track paymentMethod){
                    <option [value]="paymentMethod">{{paymentMethod}}</option>
                }
            </select>
        </div>
        <div class="text-start">
            <label for="date" class="form-label text-start">Fecha de registro</label>
            <input type="date" class="form-control" id="date" placeholder="Fecha de registro" formControlName="date">
        </div>
        @if(errorMessage){
        <div role="alert" style="border: 3px solid red; margin: 1rem 0rem 1rem 0rem; padding: 0.5rem; border-radius: 8px;">
            <p style="font-family: Poppins; letter-spacing: -1.2px; color: red; font-weight: 700; margin: 0%;"><i class="fa-solid fa-xmark m-1"></i> {{errorMessage}}</p>
        </div>
        }
        @if(loading){
        <div class="d-flex fadeInContainer flex-column align-items-center mb-1 mt-2">

            <div class="d-flex justify-content-center">
                <div class="spinner-border text-success" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
        }
        <div class="d-flex justify-content-center align-items-center mb-2 container-last-buttons">
            <input type="submit" value="AÑADIR" class="btn btn-success mt-2">
            <button class="btn btn-dark mt-2 ">CANCELAR</button>
        </div>
    </section>
</form>
