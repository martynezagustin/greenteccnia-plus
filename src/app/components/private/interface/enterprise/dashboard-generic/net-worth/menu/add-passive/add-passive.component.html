<form class="m-3 d-flex flex-column" [formGroup]="formAddPassive" (submit)="handleSubmit()">
    <h3 class="h3-form m-3"><i class="fa-solid fa-chart-line m-1"></i> Añadir un <span style="color: red">pasivo
            patrimonial</span></h3>
    <section class="m-3">

        <div class="text-start">
            <label for="category" class="form-label text-start">Categoría</label>
            <select name="category" id="category" class="form-control" formControlName="category">
                @for(category of categoriesPassive; track category.name){
                <option [value]="category.name">{{category.name}}</option>
                }
            </select>
        </div>
        @if(avaiableTypes.length > 0){
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.1rem;" class="align-items-center">
            <div class="text-start">
                <label for="type" class="form-label text-start">Tipo</label>
                <select name="type" id="type" class="form-control" formControlName="typeAccount">
                    <option selected disabled>Seleccione un tipo...</option>
                    @for(type of avaiableTypes; track type){
                    <option [value]="type">{{type}}</option>
                    }
                </select>
            </div>
            <div class="text-start">
                <label for="amount" class="form-label text-start">Valor</label>
                <input type="number" class="form-control" name="amount" id="amount" placeholder="0" formControlName="amount">
            </div>
        </div>
        }
        <div class="text-start">
            <label for="date" class="form-label text-start">Fecha de registro</label>
            <input type="date" class="form-control" id="date" placeholder="Fecha de registro" formControlName="date">
        </div>
        <div class="text-start">
            <label for="details" class="form-label text-start">Detalles</label>
            <textarea name="details" id="details" class="form-control"
                placeholder="Añade detalles del pasivo patrimonial" formControlName="details"></textarea>
        </div>
        @if(errorMessage){
            <div role="alert" style="border: 3px solid red; margin: 1rem 0rem 1rem 0rem; padding: 0.5rem; border-radius: 8px;">
                <p style="font-family: Poppins; letter-spacing: -1.2px; color: red; font-weight: 700; margin: 0%;"><i class="fa-solid fa-xmark m-1"></i> {{errorMessage}}</p>
            </div>
            }
            @if(loading){
            <div class="d-flex fadeInContainer flex-column align-items-center mb-1 mt-2">
    
                <div class="d-flex justify-content-center">
                    <div class="spinner-border text-success" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
            }
        <div class="d-flex justify-content-center align-items-center mb-2 container-last-buttons">
            <input type="submit" value="AÑADIR" class="btn btn-danger mt-2">
            <button class="btn btn-dark mt-2 ">CANCELAR</button>
        </div>
    </section>
</form>
