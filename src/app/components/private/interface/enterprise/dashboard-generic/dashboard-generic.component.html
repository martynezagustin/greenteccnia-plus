@if(loading){
<div class="d-flex flex-column align-items-center text-center mt-5 loadingFade">
    <div class="spinner-border text-light" role="status">
        <span class="visually-hidden">Loading...</span>
    </div>
    <p class="mt-3"
        style="font-size: 2rem; letter-spacing: -1.3px; font-weight: 700; font-family: Poppins; color: whitesmoke;">
        CARGANDO TU INFORMACIÓN</p>
</div>
} @else {
@if(enterprise){
<div class="container-fluid">
    <h1>Gestión de {{enterprise.nameEnterprise}}</h1>
</div>
<main class="dashboard fadeInContainer p-2">
    <div class="container">
        <div class="finances text-center">
            <app-cash-flow class="cashFlow" [enterprise]="enterprise" [userId]="userId"
                [loading]="loading"></app-cash-flow>
            <app-net-worth class="netWorth" [enterprise]="enterprise" [userId]="userId"
                [loading]="loading"></app-net-worth>
        </div>
    </div>

</main>
} @else {
@if(errorMessageEnterprise){
<div class="alert-red p-2 m-4" style="font-size: 4rem; text-align: center;">
    {{errorMessageEnterprise}}
    <a routerLink="add-enterprise" class="btn btn-dark">CREAR MI EMPRESA</a>
</div>
}
}
}
