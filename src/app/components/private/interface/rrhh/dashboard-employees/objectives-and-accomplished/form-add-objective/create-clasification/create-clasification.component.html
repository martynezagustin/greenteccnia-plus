<div class="modal fade" id="createClasification" tabindex="-1" aria-labelledby="createClasificationLabel"
    aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="createClasificationLabel">Crear clasificación de objetivos</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form [formGroup]="formAddClasification" (submit)="handleSubmit()">
                <div class="modal-body">
                    <div>
                        <label for="name" class="form-label">Nombre de la clasificación</label>
                        <input type="text" placeholder="'Compliance'" class="form-control" formControlName="name">
                    </div>
                    <div class="mt-1">
                        <label for="description" class="form-label">Descripción</label>
                        <textarea name="description" id="description" class="form-control"
                            placeholder="📄 Indica en qué consiste la clasificación..."
                            formControlName="description"></textarea>
                    </div>
                </div>
                @if(loading){
                <div class="text-center m-2">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
                }
                @if(successMessage){
                    <div class="alert alert-success">{{successMessage}}</div>
                }
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Agregar clasificación</button>
                </div>
            </form>
        </div>
    </div>
</div>
