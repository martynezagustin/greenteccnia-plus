<section class="view-item m-1">
    <button class="btn btn-danger btn-back" (click)="back()">VOLVER</button>
    <div class="d-flex m-2 mt-3 align-items-center">

        @if(item.category){ <!--Aca presuponemos un activo o pasivo, porque esa subpropiedad se aplica a ello-->
            <h2>VIENDO: {{item.category}}</h2>
        } @else {
            <h2>VIENDO: {{item.concept}}</h2>
        }
        <button class="btn btn-info" style="font-family: Montserrat; letter-spacing: -1.3px; font-weight: 700;">EDITAR</button>
    </div>
    <section class="item-desestructuring m-3" style="display: grid; grid-template-columns: 50% 50%; grid-gap: 8px;">
        <div style="background: linear-gradient(180deg, #ffffff76, #ffffffac); padding: 1.5rem; border-radius: 7px;">
            <h3 style="background-color: black; padding: 5px; border-radius: 8px; font-family: Montserrat; color: #ff3535; letter-spacing: -1.4px; font-weight: 800;">Monto del item</h3>
            <span style="font-size: 3.5rem; letter-spacing: -1.7px; font-family: Montserrat; font-weight: 800; color: whitesmoke;">${{formatValue(item.amount)}}</span>
        </div>
        <div style="background: linear-gradient(180deg, #ffffff76, #ffffffac); padding: 1.5rem; border-radius: 7px;">
            <h3 style="background-color: black; padding: 5px; border-radius: 8px; font-family: Montserrat; color: #ff3535; letter-spacing: -1.4px; font-weight: 800;">Fecha del item</h3>
            <span style="font-size: 3.5rem; letter-spacing: -1.7px; font-family: Montserrat; font-weight: 800; color: black;">{{formatDate(item.date)}}</span>
        </div>
        <div style="background: linear-gradient(180deg, #ffffff76, #ffffffac); padding: 1.5rem; border-radius: 7px;">
            <h3 style="background-color: black; padding: 5px; border-radius: 8px; font-family: Montserrat; color: #ff3535; letter-spacing: -1.4px; font-weight: 800;">Tipo de activo declarado</h3>
            <span style="font-size: 2.2rem; letter-spacing: -1.7px; font-family: Montserrat; font-weight: 800; color: black;">{{item.typeAccount}}</span>
        </div>
    </section>
</section>
